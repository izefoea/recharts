name: Update VR Snapshots (Realistic PoC)

permissions:
  contents: write
  pull-requests: write

on:
  issue_comment:
    types: [created]

jobs:
  update_snapshots:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/update-snapshots'))
    steps:
      - name: Print Event Info
        run: echo "Triggered by comment on PR #${{ github.event.issue.number }}"

      - name: Get PR branch
        id: get_pr_branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      - name: Checkout Repository - VULNERABLE Pulling attacker code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ steps.get_pr_branch.outputs.ref }}

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Dependencies - THE SINK Executes malicious package.json
        run: npm ci

      - name: Update VR Snapshots - Simulated
        run: echo "If the attacker hijacked the install step, this won't even matter!"
